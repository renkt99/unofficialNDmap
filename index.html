<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>unofficialNDmap — Notre Dame Fremantle campus</title>
<link rel="stylesheet" href="vendor/leaflet.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div id="map"></div>

<div id="search-container">
  <input type="text" id="search-input" placeholder="Search buildings and rooms…" autocomplete="off" aria-label="Search buildings and places" role="combobox" aria-expanded="false" aria-controls="search-results" aria-autocomplete="list">
  <div id="search-results" class="hidden" role="listbox" aria-label="Search results"></div>
</div>

<div id="detail-panel" class="hidden" role="dialog" aria-labelledby="panel-title">
  <button id="panel-close" aria-label="Close">&times;</button>
  <div id="panel-content"></div>
</div>

<div id="panel-backdrop" class="hidden"></div>

<div id="toast" class="hidden" role="status" aria-live="polite" aria-atomic="true"></div>

<div id="info-modal" class="hidden" role="dialog" aria-modal="true" aria-labelledby="info-modal-label">
  <div id="info-modal-content">
    <button id="info-modal-close" aria-label="Close">&times;</button>
    <p id="info-modal-label">Unofficial map — not affiliated with the University of Notre Dame Australia. Building data © OpenStreetMap contributors (ODbL). Locations marked approximate are unverified.</p>
  </div>
</div>
<div id="info-modal-backdrop" class="hidden"></div>

<script src="vendor/leaflet.js"></script>
<script src="vendor/leaflet-rotate.js"></script>
<script src="js/app.js"></script>
<script src="js/panel.js"></script>
<script src="js/locate.js"></script>
<script src="js/search.js"></script>
</body>
</html>
